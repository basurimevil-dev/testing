<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hello World Django + PostgreSQL starter project">
    <title>Hello Django 🚀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 3rem 4rem;
            text-align: center;
            max-width: 560px;
            width: 90%;
            box-shadow: 0 32px 64px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .emoji { font-size: 4rem; margin-bottom: 1rem; display: block; }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
            font-weight: 300;
            margin-bottom: 2rem;
        }

        .badge-row {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .badge {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 999px;
            padding: 0.4rem 1.1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #a78bfa;
            letter-spacing: 0.5px;
        }

        .status-box {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.3);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }

        .status-box p {
            font-size: 0.9rem;
            color: #34d399;
        }

        .footer {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            margin-top: 1.5rem;
        }

        .link {
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.2s;
        }

        .link:hover { color: #a78bfa; }
    </style>
</head>
<body>
    <div class="card">
        <span class="emoji">🌍</span>
        <h1>{{ message }}</h1>
        <p class="subtitle">Django + PostgreSQL · Ready for Deployment</p>

        <div class="badge-row">
            <span class="badge">🐍 Python 3.11</span>
            <span class="badge">🎸 Django 4.2</span>
            <span class="badge">🐘 PostgreSQL</span>
        </div>

        <div class="status-box">
            <p>🗄️ Database Status: <strong>{{ db_status }}</strong></p>
            <p style="margin-top:0.4rem; color: rgba(255,255,255,0.5); font-size:0.8rem;">
                Record created: {{ created_at|date:"Y-m-d H:i:s" }}
            </p>
        </div>

        <p style="color: rgba(255,255,255,0.5); font-size: 0.85rem;">
            Visit <a class="link" href="/health/">/health/</a> for JSON status &nbsp;|&nbsp;
            <a class="link" href="/admin/">Admin Panel</a>
        </p>

        <p class="footer">Built with ❤️ · Django Hello World Starter</p>
    </div>
</body>
</html>
